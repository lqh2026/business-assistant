<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商业知识问答助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.2rem; margin-bottom: 10px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { opacity: 0.8; color: #a0a0a0; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .card h3 { color: #fff; margin-bottom: 15px; font-size: 1rem; }
        .input-group { display: flex; gap: 10px; flex-wrap: wrap; }
        input { flex: 1; min-width: 200px; padding: 14px 18px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; color: white; font-size: 14px; }
        input::placeholder { color: rgba(255,255,255,0.4); }
        input:focus { outline: none; border-color: #667eea; }
        .btn { padding: 14px 28px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: 600; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102,126,234,0.4); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .api-status { margin-top: 12px; font-size: 13px; color: #a0a0a0; }
        .api-status.connected { color: #22c55e; }
        .search-box input { min-width: unset; padding: 18px 22px; font-size: 16px; border-radius: 14px; }
        .quick-questions { margin-top: 20px; }
        .quick-questions h4 { color: #a0a0a0; font-size: 13px; margin-bottom: 12px; }
        .quick-btn { display: inline-block; padding: 10px 18px; margin: 4px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 25px; font-size: 13px; cursor: pointer; color: #d0d0d0; }
        .quick-btn:hover { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .loading { display: none; text-align: center; padding: 50px; color: #a0a0a0; }
        .loading.active { display: block; }
        .loading-spinner { width: 60px; height: 60px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .result { display: none; }
        .result.active { display: block; }
        .answer-content { line-height: 1.9; color: #e0e0e0; font-size: 15px; }
        .answer-content p { margin-bottom: 15px; }
        .answer-content strong { color: #fff; }
        .sources { margin-top: 30px; padding-top: 25px; border-top: 1px solid rgba(255,255,255,0.1); }
        .sources h4 { color: #a0a0a0; font-size: 13px; margin-bottom: 15px; }
        .source-item { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 12px 18px; margin-bottom: 10px; font-size: 13px; }
        .source-item a { color: #667eea; text-decoration: none; word-break: break-all; }
        .error-box { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); border-radius: 12px; padding: 15px 20px; color: #fca5a5; margin-bottom: 20px; display: none; }
        .error-box.active { display: block; }
        .footer { text-align: center; color: #666; margin-top: 40px; font-size: 13px; }
        @media (max-width: 600px) { .header h1 { font-size: 1.6rem; } .search-input-group, .input-group { flex-direction: column; } .btn { width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>💼 商业知识问答助手</h1><p>联网搜索 + AI 智能回答，助您解决商业疑问</p></div>
        <div class="card"><h3>🔑 API 配置</h3><div class="input-group"><input type="password" id="apiKey" placeholder="MiniMax API Key（Group ID:Secret Key）"><input type="text" id="groupId" placeholder="Group ID（可选）"><button class="btn" onclick="saveConfig()">保存配置</button></div><div class="api-status" id="apiStatus"></div></div>
        <div class="error-box" id="errorBox"></div>
        <div class="card search-box"><h3>💡 提出您的商业问题</h3><div style="display:flex;gap:10px"><input type="text" id="questionInput" placeholder="例如：什么是商业模式画布？"><button class="btn" onclick="askQuestion()" id="searchBtn">搜索回答</button></div>
            <div class="quick-questions"><h4>快捷问题：</h4><button class="quick-btn" onclick="quickAsk('什么是商业模式画布？')">商业模式画布</button><button class="quick-btn" onclick="quickAsk('如何进行市场调研？')">市场调研</button><button class="quick-btn" onclick="quickAsk('SWOT分析怎么做？')">SWOT分析</button><button class="quick-btn" onclick="quickAsk('什么是蓝海战略？')">蓝海战略</button><button class="quick-btn" onclick="quickAsk('创业融资流程？')">创业融资</button></div>
        </div>
        <div class="loading" id="loading"><div class="loading-spinner"></div><p>正在搜索并分析答案...</p></div>
        <div class="card result" id="result"><h3>📋 回答结果</h3><div class="answer-content" id="answerContent"></div><div class="sources" id="sourcesSection"><h4>📚 信息来源</h4><div id="sourcesList"></div></div></div>
        <div class="footer">基于 MiniMax AI + 联网搜索</div>
    </div>
    <script>
        function loadConfig(){const k=localStorage.getItem('miniMaxApiKey'),g=localStorage.getItem('miniMaxGroupId');if(k){document.getElementById('apiKey').value=k;document.getElementById('apiStatus').textContent='✓ 已加载保存的配置';document.getElementById('apiStatus').className='api-status connected'}if(g)document.getElementById('groupId').value=g}
        function saveConfig(){const k=document.getElementById('apiKey').value.trim(),g=document.getElementById('groupId').value.trim();if(!k){showError('请输入 API Key');return}localStorage.setItem('miniMaxApiKey',k);if(g)localStorage.setItem('miniMaxGroupId',g);document.getElementById('apiStatus').textContent='✓ 配置已保存';document.getElementById('apiStatus').className='api-status connected';hideError()}
        document.addEventListener('DOMContentLoaded',loadConfig);
        function showError(m){const e=document.getElementById('errorBox');e.textContent=m;e.classList.add('active')}
        function hideError(){document.getElementById('errorBox').classList.remove('active')}
        function quickAsk(q){document.getElementById('questionInput').value=q;askQuestion()}
        async function searchWeb(q){try{const r=await fetch('/api/search?query='+encodeURIComponent(q)),d=await r.json();return d.results||[]}catch(e){return[]}}
        async function callMiniMax(q,sr){const k=document.getElementById('apiKey').value.trim(),g=document.getElementById('groupId').value.trim();if(!k)throw new Error('请先配置 MiniMax API Key');const ctx=sr.map(r=>`【${r.title}】\n${r.snippet}\n来源: ${r.url}`).join('\n\n'),r=await fetch('/api/minimax',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({apiKey:k,groupId:g,question:q,context:ctx})}),d=await r.json();if(!r.ok)throw new Error(d.error||'API 调用失败');return d.answer}
        async function askQuestion(){const q=document.getElementById('questionInput').value.trim();if(!q){showError('请输入您的问题');return}const k=document.getElementById('apiKey').value.trim();if(!k){showError('请先配置 MiniMax API Key');return}hideError();document.getElementById('loading').classList.add('active');document.getElementById('result').classList.remove('active');document.getElementById('searchBtn').disabled=true;try{const sr=await searchWeb(q),a=await callMiniMax(q,sr);document.getElementById('answerContent').innerHTML=a.replace(/\n/g,'<br>');const ss=document.getElementById('sourcesSection'),sl=document.getElementById('sourcesList');if(sr.length>0){ss.style.display='block';sl.innerHTML=sr.filter(s=>s.url).map(s=>`<div class="source-item"><a href="${s.url}" target="_blank">${s.title}</a></div>`).join('')}else{ss.style.display='none'}document.getElementById('result').classList.add('active')}catch(e){showError('查询失败: '+e.message)}finally{document.getElementById('loading').classList.remove('active');document.getElementById('searchBtn').disabled=false}}
        document.getElementById('questionInput').addEventListener('keypress',e=>{if(e.key==='Enter')askQuestion()});
    </script>
</body>
</html>
